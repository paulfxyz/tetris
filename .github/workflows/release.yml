name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package game bundle
        run: |
          mkdir -p dist
          (cd public && zip -r ../dist/tetris-${{ github.ref_name }}.zip .)
          tar -czf dist/tetris-${{ github.ref_name }}.tar.gz -C public .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tetris-${{ github.ref_name }}.zip
            dist/tetris-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
          body_path: CHANGELOG.md
