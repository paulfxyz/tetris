# fly.toml — tetris scoreboard
# Deploy: cd server && fly launch --no-deploy && fly volumes create tetris_data --size 1 --region cdg
# Then:   fly secrets set PGP_PRIVATE_KEY="$(cat ./keys/pgp-private.asc)"
#         fly deploy

app = "tetris-scoreboard"
primary_region = "cdg"

[build]

[env]
  PORT = "8080"
  DB_PATH = "/data/scores.db"
  ALLOWED_ORIGINS = "*"

[[mounts]]
  source = "tetris_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
